{% load static %}
<!doctype html>
<html lang="en">
<style>
head {}

body {
	background-color: #FBE7C8;
	border-left-color: #AED581;
	border-left-width: 25px;
	border-left-style: dashed;
}

.recipecard {
	position: absolute;
	width: 200px;
	height: 250px;
	background-color: #CAEDF1;
  border-radius: 5px;
}

.recipetitle{
  position: relative;
  top: 20px;
  left: 20px;

  width: 160px;
  height: 30px;
  font-size: 14px;
  font-family: "Avenir Next LT Pro", arial;
  text-align: center;
  /* white-space: nowrap; (maybe add at some point?) */
}

.recipeimage {
  position: relative;
  top: 60px;
  left: 20px;

  width: 160px;
  height: 100px;
  object-fit: cover;
}

.recipecardsedcription {
  position: relative;
  top: 180px;
  left: 20px;

  width: 160px;
  height: 60px;
  font-size: 12px;
  font-family: "Avenir Next LT Pro", arial;
  text-align: center;
}

.header {
	background-color: #FBE7C8;
}

.footer {
	background-color: #FBE7C8;
}
</style>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Find My Recipe{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body class="app-bg">

  {% block topbar %}{% endblock %}

  <main class="py-3">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}

  <div class = "recipecard">
    <div class = "recipetitle"> {{ recipetitle }}</div>
    <div class = "recipedescription"> {{ recipedescription }}</div>
    <img src="{{ recipe.image.url }}" class="recipeimage" alt="{{ recipe.title }}">
  </div>


</body>
</html>
