{% extends "base.html" %}
{% block title %}Login | Find My Recipe{% endblock %}

{% block content %}
<div class="container" style="max-width: 520px;">
  <div class="card p-3">
    <h4>Login</h4>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Login</button>
    </form>
    <hr>
    <div class="small">
      No account? <a href="{% url 'signup' %}">Sign up</a>
    </div>
  </div>
</div>
{% endblock %}
</style>
